function computeEmployerCode(emp) {

/**
 * Given a raw phone string, return {flag, country, formatted, isLebanon, hasCC}
 * Handles:
 *   +961 X XXX XXXX  → Lebanon with CC
 *   +966 5X XXXX XXXX → Saudi with CC
 *   00961...         → normalises 00 → +
 *   03 123 456       → no CC, treated as unknown/local
 */
function parsePhone(raw) {
    var s = String(raw || '').trim().replace(/[\s\-().]/g, '');
    // Normalise 00XX → +XX
    if (/^00[1-9]/.test(s)) s = '+' + s.slice(2);

    var flag = '📞', country = '', hasCC = false;

    var iso2 = '';
    if (s.charAt(0) === '+') {
        hasCC = true;
        // Walk from longest prefix to shortest to find match
        for (var i = 0; i < PHONE_CC.length; i++) {
            if (s.indexOf(PHONE_CC[i][0]) === 0) {
                flag    = PHONE_CC[i][1];
                country = PHONE_CC[i][2];
                iso2    = PHONE_CC[i][3] || '';
                break;
            }
        }
        if (!country) { flag = '🌐'; country = 'International'; iso2 = 'XX'; }
    }

    // Pretty-format Lebanese numbers: +961 X XXX XXXX or +961 XX XXX XXX
    var formatted = raw.trim();
    if (hasCC && s.indexOf('+961') === 0) {
        var local = s.slice(4); // strip +961
        if (local.length === 7)      formatted = '+961 ' + local.slice(0,1) + ' ' + local.slice(1,4) + ' ' + local.slice(4);
        else if (local.length === 8) formatted = '+961 ' + local.slice(0,2) + ' ' + local.slice(2,5) + ' ' + local.slice(5);
    }

    return {
        flag:      flag,
        country:   country,
        iso2:      iso2,
        formatted: formatted,
        isLebanon: hasCC && s.indexOf('+961') === 0,
        hasCC:     hasCC
    };
}

    var result = [];
    Object.keys(emp).forEach(function(key) {
        if (!PHONE_FIELD_PATTERNS.test(key)) return;
        var val = String(emp[key] || '').trim();
        if (!val || val === '-' || val === 'undefined' || val === 'null') return;
        // Normalise for dedup (strip spaces/dashes)
        var norm = val.replace(/[\s\-().]/g,'');
        if (seen[norm]) return;
        seen[norm] = true;
        // Numbered fields e.g. MobileNumber7 → "Mobile 7", PhoneNumber2 → "Phone 2"
        var keyL  = key.toLowerCase();
        var label = PHONE_LABEL_MAP[keyL];
        if (!label) {
            var numMatch = key.match(/^([A-Za-z]+?)(\d+)$/);
            if (numMatch) {
                var base = PHONE_LABEL_MAP[numMatch[1].toLowerCase()] || numMatch[1].replace(/([A-Z])/g,' $1').trim();
                label = base + ' ' + numMatch[2];
            } else {
                label = key.replace(/([A-Z])/g,' $1').trim();
            }
        }
        var parsed   = parsePhone(val);
        result.push({ label: label, value: val, parsed: parsed });
    });
    if (!result.length) {
        var fallback = (emp.ContactNumber || emp.Phone || '').trim();
        if (fallback) {
            result.push({ label: 'Phone', value: fallback, parsed: parsePhone(fallback) });
        }
    }
    return result;
}

// ── google.script.run wrapper ──────────────────────────────────────
function gsr(fn, args) {
    return new Promise(function(resolve, reject) {
        google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            [fn].apply(google.script.run, args || []);
    });
}

// ── Data loading ───────────────────────────────────────────────────
// Phase 1: employers only → search unlocks immediately
// Phase 2: workers + agencies silently in background
async function loadData() {
    var btn = document.getElementById('cloudBtn');
    btn.textContent = '⏳ Loading...'; btn.className = 'cloud-btn';

    // ── Phase 1: Employers only ──────────────────────────────────
    try {
        var r = await gsr('getEmployers');
        if (r && r.success) allEmployers = r.data || [];
        btn.textContent = '☁️ ' + allEmployers.length + ' employers ⟳';
        btn.className = 'cloud-btn ok';
    } catch(e) {
        btn.textContent = '❌ Retry'; btn.className = 'cloud-btn err';
        console.error('loadData employers:', e); return;
    }

    // ── Phase 2: Workers + Agencies in background ────────────────
    Promise.all([gsr('getWorkers'), gsr('getAgencies')])
        .then(function(res) {
            if (res[0] && res[0].success) allWorkers  = res[0].data || [];
            if (res[1] && res[1].success) allAgencies = res[1].data || [];
            btn.textContent = '☁️ ' + allEmployers.length + ' employers';
            btn.className = 'cloud-btn ok';
            if (currentEmp) renderEmpCard(currentEmp);
        })
        .catch(function(e){ console.warn('Background load:', e); });
}

// ── Search ─────────────────────────────────────────────────────────
function onSearch(q) {
    var box = document.getElementById('resultsBox');
    if (!q || q.length < 2) { box.style.display='none'; return; }
    var ql = q.toLowerCase();
    // Score-ranked search across EVERY field on the employer object
    var scored = [];
    allEmployers.forEach(function(e){
        var code    = computeEmployerCode(e);
        var agObj   = allAgencies.find(function(a){ return a.AgencyCode===e.AgencyCode; });
        var agName  = agObj ? (agObj.AgencyName||'') : '';
        // Priority fields — match here scores higher (shown first)
        var primary = [
            code,
            e.EmployerCode||'', e.EmployerName||'', e.EFN||'',
            e.AgencyCode||'', agName,
            e.ContactName||'', e.Country||'', e.City||''
        ].join(' ').toLowerCase();
        // All remaining fields as flat string
        var full = (primary + ' ' + JSON.stringify(e)).toLowerCase();
        if (!full.includes(ql)) return;
        // Score: 2 if match in primary fields, 1 if only in full dump
        scored.push({ e:e, code:code, agN:agObj?(agObj.AgencyName||e.AgencyCode):(e.AgencyCode||''), score: primary.includes(ql)?2:1 });
    });
    // Sort by score desc, then by employer name asc
    scored.sort(function(a,b){
        if (b.score !== a.score) return b.score - a.score;
        return (a.e.EmployerName||a.e.EFN||'').localeCompare(b.e.EmployerName||b.e.EFN||'');
    });
    var hits = scored.slice(0, 25);
    if (!hits.length) {
        box.innerHTML = '<div style="padding:12px 16px;color:#aaa;font-size:13px">No employers found</div>';
        box.style.display = 'block'; return;
    }
    box.innerHTML = hits.map(function(item){
        var e = item.e;
        return '<div class="res-item" onclick="pickEmp('+e.EmployerID+')">'
            + '<div class="res-name">'+(e.EmployerName||e.EFN||'Unknown')+'</div>'
            + '<div class="res-sub">Code: <b>'+item.code+'</b>'
            + (item.agN ? ' &nbsp;•&nbsp; Agency: <b>'+item.agN+'</b>' : '')
            + (e.Country ? ' &nbsp;•&nbsp; '+e.Country : '')
            + '</div>'
            + '</div>';
    }).join('');
    box.style.display = 'block';
}

    var ag   = allAgencies.find(function(a){ return a.AgencyCode===emp.AgencyCode; });

        return (w.Processing===true||w.Processing==='true'||w.Processing==='Yes')

            } else {

                extra = ' <span title="No country code — add +CC for international" style="font-size:10px;color:#e65100;font-weight:700" >⚠ no +CC</span>';
            }

function folderInfo(emp) {

async function startSaveToDrive() {

        spShow('💾 Saving to Drive', 'Fetching file list...', '', 2);
        try { currentFiles = await listFiles(currentEmp); } catch(e) { spHide(); toast('❌ '+e.message,'#c62828'); return; }

window._saveToDrive = async function(onlySelected) {
    if (!currentEmp) return;
    var filesToSave = [];
    if (onlySelected && docWin && !docWin.closed) {
        docWin.document.querySelectorAll('.card').forEach(function(d) {
            var chk = d.querySelector('.chk');
            if (!(chk && chk.checked)) return;
            var a = d.querySelector('.ch a'); var url = a ? a.href : '';
            var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/); var fid = m ? m[1] : '';
            var t = d.querySelector('.ct'); var raw = t ? t.textContent.trim() : '';
            var nm = raw.replace(/^.{1,3}\s*\d+\.\s*/, '');
            var isPdf = /\.pdf$/i.test(nm);
            var isImg = /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(nm);
            if (fid && (isPdf || isImg)) filesToSave.push({title:nm, fid:fid, isPdf:isPdf});
        });
        if (!filesToSave.length) { toast('No files selected', '#888'); return; }
    } else {
        if (!currentFiles.length) {
            spShow('💾 Saving to Drive', 'Fetching file list...', '', 2);
            try { currentFiles = await listFiles(currentEmp); } catch(e) { spHide(); toast('❌ '+e.message,'#c62828'); return; }
        }
        filesToSave = currentFiles
            .filter(function(f){ var mt=String(f.mimeType||''); return mt==='application/pdf'||mt.indexOf('image/')===0; })
            .map(function(f){ var isPdf=f.mimeType==='application/pdf'; return {title:f.name||'', fid:f.id||'', isPdf:isPdf}; })
            .filter(function(x){ return x.fid; });
    }
    if (!filesToSave.length) { toast('No PDF or image files found', '#888'); return; }
    await runSave(filesToSave);
};

async function runSave(allItems) {
    _saveCancel = false;
    clearInterval(_saveTimer); _saveTimer = null;

    var fi         = folderInfo(currentEmp);
    var emp        = currentEmp;
    var empCode    = computeEmployerCode(emp);
    var reportDate = new Date().toISOString().split('T')[0];
    var CHUNK      = 25;
    var totalParts = Math.ceil(allItems.length / CHUNK);

    spShow('💾 Saving to Drive', 'Fetching all files from Drive...', allItems.length + ' files', 5);

    var fileIds = allItems.map(function(x){ return x.fid; });
    var allContents;
    try {
        allContents = await gsr('getAllFileContents', [fileIds]);
    } catch(e) {
        spHide();
        toast('❌ Batch fetch failed: ' + e.message, '#c62828');
        return;
    }
    if (!allContents || !allContents.success) {
        spHide();
        toast('❌ ' + (allContents && allContents.error || 'Unknown error'), '#c62828');
        return;
    }
    var contentMap = allContents.files || {};

    spShow('💾 Saving to Drive', 'Loading PDF library...', '', 10);
    if (!window.jspdf) {
        await new Promise(function(res, rej) {
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
        });
    }

    var uploaded = [], failed = 0;
    var pageW=210, pageH=297, margin=10;
    var firstPageInChunk = true;

    for (var chunkIdx = 0; chunkIdx < totalParts; chunkIdx++) {
        if (_saveCancel) break;
        var start = chunkIdx * CHUNK;
        var end   = Math.min(start + CHUNK, allItems.length);
        var chunk = allItems.slice(start, end);
        var doc   = new window.jspdf.jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
        firstPageInChunk = true;

        for (var j = 0; j < chunk.length; j++) {
            if (_saveCancel) break;
            var item    = chunk[j];
            var globalI = start + j;
            var pct     = 15 + Math.round((globalI / allItems.length) * 70);
            spShow('💾 Saving to Drive',
                'File ' + (globalI+1) + ' of ' + allItems.length + ' — part ' + (chunkIdx+1) + '/' + totalParts,
                (globalI+1) + '. ' + item.title.substring(0, 60), pct);
            await new Promise(function(r){ setTimeout(r, 30); });

            var fileB64 = null, fileMime = 'image/jpeg', iw = 800, ih = 600;
            var fc = contentMap[item.fid];
            if (fc && fc.content) { fileB64 = fc.content; fileMime = fc.mimeType || 'image/jpeg'; }

            if (fileB64 && fileMime === 'application/pdf') {
                try {
                    if (!window.pdfjsLib) {
                        await new Promise(function(res,rej){ var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
                        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    }
                    var bytes  = Uint8Array.from(atob(fileB64), function(c){ return c.charCodeAt(0); });
                    var pdfd   = await window.pdfjsLib.getDocument({data:bytes}).promise;
                    var numPgs = pdfd.numPages;
                    for (var pgNum = 1; pgNum <= numPgs; pgNum++) {
                        if (!firstPageInChunk) doc.addPage();
                        firstPageInChunk = false;
                        doc.setFillColor(74,20,140); doc.rect(0,0,pageW,12,'F');
                        doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
                        doc.text((globalI+1)+'. '+item.title.substring(0,72)+(numPgs>1?' (p'+pgNum+'/'+numPgs+')':''), 5, 8);
                        var pg2 = await pdfd.getPage(pgNum);
                        var vp2 = pg2.getViewport({scale:1.6});
                        var cv2 = document.createElement('canvas');
                        cv2.width = vp2.width; cv2.height = vp2.height;
                        await pg2.render({canvasContext:cv2.getContext('2d'), viewport:vp2}).promise;
                        var pg64 = cv2.toDataURL('image/jpeg', 0.85).split(',')[1];
                        var r3=vp2.height/vp2.width, dw2=pageW-margin*2, dh2=dw2*r3;
                        if (dh2>pageH-14){dh2=pageH-14; dw2=dh2/r3;}
                        doc.addImage(pg64,'JPEG',(pageW-dw2)/2,14,dw2,dh2,undefined,'FAST');
                        var pgPct = 15 + Math.round(((globalI + pgNum/numPgs) / allItems.length) * 70);
                        spShow(undefined, 'File '+(globalI+1)+'/'+allItems.length+(numPgs>1?' — page '+pgNum+'/'+numPgs:''), (globalI+1)+'. '+item.title.substring(0,55), pgPct);
                        await new Promise(function(r){ setTimeout(r, 30); });
                    }
                    fileB64 = null;
                } catch(pe) { fileB64 = null; console.warn('PDF.js:', pe.message); }
            }

            if (fileB64) {
                if (!firstPageInChunk) doc.addPage();
                firstPageInChunk = false;
                doc.setFillColor(74,20,140); doc.rect(0,0,pageW,12,'F');
                doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
                doc.text((globalI+1)+'. '+item.title.substring(0,85), 5, 8);
                var tmp = new Image();
                await new Promise(function(res){
                    tmp.onload = function(){ if(iw===800&&ih===600){iw=tmp.naturalWidth||800; ih=tmp.naturalHeight||600;} res(); };
                    tmp.onerror = res;
                    tmp.src = 'data:'+fileMime+';base64,'+fileB64;
                });
                var r2=ih/iw, dw=pageW-margin*2, dh=dw*r2;
                if (dh>pageH-14){dh=pageH-14; dw=dh/r2;}
                doc.addImage(fileB64,'JPEG',(pageW-dw)/2,14,dw,dh,undefined,'FAST');
            }
        }

        var safeName = (emp.EFN||emp.ContactName||emp.EmployerName||empCode);
        safeName = safeName.replace(/[^a-zA-Z0-9\u0600-\u06FF\s-]/g,'').trim().replace(/\s+/g,'_').substring(0,30);
        var range = (start+1) + '-' + end;
        var fname = 'Docs_'+empCode+'_'+safeName+'_'+reportDate+'_pt'+(chunkIdx+1)+'of'+totalParts+'_(files_'+range+').pdf';
        var uploadPct = 85 + Math.round(((chunkIdx+1)/totalParts)*14);
        spShow('💾 Uploading to Drive', 'Uploading part '+(chunkIdx+1)+'/'+totalParts, fname, uploadPct);
        await new Promise(function(r){ setTimeout(r, 30); });

        try {
            var b64 = doc.output('datauristring').split(',')[1];
            var d   = await gsr('uploadDocsChunk', [fi.folderId, fi.folderName, fname, b64]);
            if (d && d.success) uploaded.push(fname);
            else { failed++; console.warn('Upload failed:', d && d.error); }
        } catch(e) { failed++; console.warn('Upload error:', e.message); }
    }

    var elapsed = Math.round((Date.now() - _saveStart) / 1000);
    var timeStr = elapsed < 60 ? elapsed+'s' : Math.floor(elapsed/60)+'m '+(elapsed%60)+'s';

    if (_saveCancel) {
        spShow('🚫 Cancelled', 'Stopped by user after '+timeStr, uploaded.length+' part(s) already uploaded', 100);
        document.getElementById('spTitle').style.color = '#e65100';
        spHide(4000);
    } else if (uploaded.length > 0) {
        spShow('✅ Done!',
            'Saved '+uploaded.length+' part'+(uploaded.length>1?'s':'')+' in '+timeStr+(failed?' ('+failed+' failed)':''),
            uploaded.join('\n'), 100);
        document.getElementById('spTitle').style.color = '#2e7d32';
        spHide(5000);
    } else {
        spShow('❌ Upload Failed', 'All uploads failed — check console', '', 100);
        document.getElementById('spTitle').style.color = '#c62828';
        spHide(6000);
    }
}

            var fn=String(f.name||'—');var fs=fn.length>54?fn.substring(0,51)+'...':fn;
            var isRpt=/^Report_/i.test(fn);
            var mt=String(f.mimeType||'').replace('application/pdf','PDF').replace('image/','img/').replace('application/','').substring(0,14);
            var sz=f.size>0?(f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(f.size/1024).toFixed(0)+' KB'):'-';
            var dt=f.date?new Date(f.date).toLocaleDateString('en-GB'):'-';
            doc.setFont('helvetica','normal');doc.setFontSize(7.5);
            if (isRpt) doc.setTextColor(130,130,130); else doc.setTextColor(50,50,50);
            doc.text(String(i+1),margin+2,y+4.8);doc.text(fs,margin+8,y+4.8);
            doc.text(mt,margin+110,y+4.8);doc.text(sz,margin+140,y+4.8);doc.text(dt,rightX-3,y+4.8,{align:'right'});
            if (isRpt) { doc.setFontSize(6); doc.setTextColor(160,160,160); doc.text('(report)',rightX-35,y+4.8); }
            doc.setTextColor(50,50,50);
            y+=7;
        });
        y+=4;
    }
    div();

    // ── Summary page footer (pages 1..N of summary) ───────────────
    var summaryPages = doc.internal.getNumberOfPages();
    for(var pg=1;pg<=summaryPages;pg++){
        doc.setPage(pg);doc.setDrawColor(200,200,200);doc.line(margin,pageH-10,rightX,pageH-10);
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(160,160,160);
        doc.text('Massroua General Services — '+empName+' ('+empCode+')',margin,pageH-5);
        doc.text('Summary p.'+pg+' of '+summaryPages,rightX,pageH-5,{align:'right'});
    }

    // ── Document preview pages ─────────────────────────────────────
    rpShow('Loading documents for preview...', 78, 5, '', '📄 Embedding Documents');
    await new Promise(function(r){ setTimeout(r,30); });

    var previewFiles = indexFiles.filter(function(f){
        var mt = String(f.mimeType||'');
        return mt === 'application/pdf' || mt.indexOf('image/') === 0;
    });

    if (previewFiles.length) {
        // Ensure PDF.js loaded
        if (!window.pdfjsLib) {
            rpShow('Loading PDF library...', 80, 5, '');
            await new Promise(function(res,rej){ var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
            window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // Batch-fetch all preview file contents
        rpShow('Fetching document contents...', 82, 5, '');
        await new Promise(function(r){ setTimeout(r,30); });
        var previewIds = previewFiles.map(function(f){ return f.id||''; }).filter(Boolean);
        var contentMap = {};
        try {
            var ac = await gsr('getAllFileContents', [previewIds]);
            if (ac && ac.success) contentMap = ac.files || {};
        } catch(e){ console.warn('Preview fetch failed:', e.message); }

        for (var pi=0; pi<previewFiles.length; pi++) {
            var pf  = previewFiles[pi];
            var pct = 83 + Math.round((pi / previewFiles.length) * 7);
            rpShow('Embedding ' + (pi+1) + ' / ' + previewFiles.length, pct, 5, pf.name.substring(0,55));
            await new Promise(function(r){ setTimeout(r, 0); });

            var fc    = contentMap[pf.id||''];
            var b64   = fc ? fc.content   : null;
            var mime  = fc ? (fc.mimeType||'image/jpeg') : (pf.mimeType||'image/jpeg');
            var fname = String(pf.name||'');

            if (!b64) continue; // skip if not fetched

            if (mime === 'application/pdf') {
                try {
                    var bytes = Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });
                    var pdfd  = await window.pdfjsLib.getDocument({data:bytes}).promise;
                    for (var pgN=1; pgN<=pdfd.numPages; pgN++) {
                        doc.addPage();
                        // Purple header bar
                        doc.setFillColor(74,20,140); doc.rect(0,0,pageW,12,'F');
                        doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
                        var hdr = (pi+1)+'. '+fname.substring(0,70)+(pdfd.numPages>1?' (p'+pgN+'/'+pdfd.numPages+')':'');
                        doc.text(hdr, 5, 8);
                        // Render page to canvas
                        var pg2 = await pdfd.getPage(pgN);
                        var vp  = pg2.getViewport({scale:1.4});
                        var cv  = document.createElement('canvas');
                        cv.width=vp.width; cv.height=vp.height;
                        await pg2.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
                        var img64 = cv.toDataURL('image/jpeg',0.82).split(',')[1];
                        var r3=vp.height/vp.width, dw=pageW-margin*2, dh=dw*r3;
                        if(dh>pageH-14){dh=pageH-14; dw=dh/r3;}
                        doc.addImage(img64,'JPEG',(pageW-dw)/2,14,dw,dh,undefined,'FAST');
                        // Footer
                        doc.setDrawColor(200,200,200); doc.line(margin,pageH-10,rightX,pageH-10);
                        doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(160,160,160);
                        doc.text(empName+' ('+empCode+') — '+fname.substring(0,50),margin,pageH-5);
                        doc.text('Doc '+(pi+1)+'/'+previewFiles.length+(pdfd.numPages>1?' p'+pgN+'/'+pdfd.numPages:''),rightX,pageH-5,{align:'right'});
                    }
                } catch(pe){ console.warn('PDF preview failed:',fname,pe.message); }
            } else {
                // Image file
                try {
                    doc.addPage();
                    doc.setFillColor(74,20,140); doc.rect(0,0,pageW,12,'F');
                    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
                    doc.text((pi+1)+'. '+fname.substring(0,85), 5, 8);
                    var tmp = new Image();
                    var iw=800, ih=600;
                    await new Promise(function(res){
                        tmp.onload=function(){ iw=tmp.naturalWidth||800; ih=tmp.naturalHeight||600; res(); };
                        tmp.onerror=res;
                        tmp.src='data:'+mime+';base64,'+b64;
                    });
                    var r2=ih/iw, dw2=pageW-margin*2, dh2=dw2*r2;
                    if(dh2>pageH-14){dh2=pageH-14; dw2=dh2/r2;}
                    doc.addImage(b64,'JPEG',(pageW-dw2)/2,14,dw2,dh2,undefined,'FAST');
                    // Footer
                    doc.setDrawColor(200,200,200); doc.line(margin,pageH-10,rightX,pageH-10);
                    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(160,160,160);
                    doc.text(empName+' ('+empCode+') — '+fname.substring(0,50),margin,pageH-5);
                    doc.text('Doc '+(pi+1)+'/'+previewFiles.length,rightX,pageH-5,{align:'right'});
                } catch(ie){ console.warn('Image preview failed:',fname,ie.message); }
            }
        }
    }

    // ── Build filename with computed code ──────────────────────────
    rpShow('Uploading to Drive...', 92, 6, fileName, '☁️ Uploading Report');
    var hh=String(today.getHours()).padStart(2,'0');
    var mm=String(today.getMinutes()).padStart(2,'0');
    var ss=String(today.getSeconds()).padStart(2,'0');
    var safeName = (emp.EFN||emp.ContactName||empName)
        .replace(/[^a-zA-Z0-9\u0600-\u06FF\s-]/g,'').trim()
        .replace(/\s+/g,'_').substring(0,30);
    var fileName = 'Report_'+empCode+'_'+safeName+'_'+reportDate+'_'+hh+'h'+mm+'m'+ss+'s.pdf';

    // ── Download locally ───────────────────────────────────────────
    var link=document.createElement('a');link.href=doc.output('bloburl');link.download=fileName;link.click();
    rpHide();

    // ── Upload to employer Drive folder — 3 attempts ───────────────
    toast('⏳ Uploading report to Drive...','#7b1fa2', 15000);
    var uploaded = false;
    for (var attempt=1; attempt<=3; attempt++) {
        try {
            rpShow('Uploading to Drive' + (attempt>1?' (attempt '+attempt+'/3)':'') + '...', 93 + attempt, 6, fileName, '☁️ Uploading Report');
            await new Promise(function(r){ setTimeout(r,30); });
            var b64r = doc.output('datauristring').split(',')[1];
            rpShow('Sending to Drive...', 95, 6, fileName);
            var ur   = await gsr('uploadReport',[fi.folderId, fi.folderName, fileName, b64r]);
            if (ur && ur.success) {
                uploaded = true;
                rpShow('✅ Saved to Drive!', 100, 6, fileName, '✅ Done');
                await new Promise(function(r){ setTimeout(r, 800); });
                toast('✅ Report saved to Drive: '+fileName,'#2e7d32', 7000);
                rpHide(2000);
                break;
            } else {
                rpShow('⚠️ Upload attempt '+attempt+' failed — retrying...', 94, 6, ur&&ur.error||'');
                console.warn('Upload attempt '+attempt+' failed:', ur&&ur.error);
                if (attempt < 3) await new Promise(function(r){setTimeout(r,2000);});
            }
        } catch(e) {
            rpShow('⚠️ Error on attempt '+attempt+' — retrying...', 94, 6, e.message||'');
            console.warn('Upload attempt '+attempt+' error:', e.message);
            if (attempt < 3) await new Promise(function(r){setTimeout(r,2000);});
        }
    }
    if (!uploaded) {
        rpShow('❌ Upload failed', 100, 6, 'File downloaded locally only', '❌ Upload Failed');
        await new Promise(function(r){ setTimeout(r, 1500); });
        toast('❌ Drive upload failed after 3 attempts — file was downloaded locally','#c62828', 8000);
        rpHide(2500);
    }

    // Open doc viewer after report is generated
    // Use currentFiles (no Report_ files) — viewer is for working documents only
    var viewerFiles = currentFiles.length ? currentFiles : displayFiles.filter(function(f){ return !/^Report_/i.test(String(f.name||'')); });
    if (viewerFiles.length) buildDocViewerWindow(viewerFiles, emp);
}

// ── Boot ───────────────────────────────────────────────────────────
(function waitForGoogle(tries) {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        loadData();
    } else if (tries < 30) {
        setTimeout(function(){ waitForGoogle(tries + 1); }, 200);
    } else {
        var btn = document.getElementById('cloudBtn');
        btn.textContent = '❌ Open via Apps Script URL';
        btn.className = 'cloud-btn err';
    }
})(0);
</script>
</body>
</html>
