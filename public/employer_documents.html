<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGS - Employer Documents</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px; min-height: 100vh;
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 280px 1fr;
            gap: 20px; height: calc(100vh - 40px);
        }
        .nav-panel {
            background: white; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .nav-header {
            padding: 12px 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; border-radius: 8px;
        }
        .nav-header h2 { font-size: 15px; margin-bottom: 3px; }
        .nav-header p  { font-size: 11px; opacity: 0.9; }
        .search-box {
            padding: 7px 10px; border: 1px solid #ced4da; border-radius: 5px;
            font-size: 13px; width: 100%;
        }
        .record-list { list-style: none; flex: 1; overflow-y: auto; }
        .record-item {
            padding: 8px 12px; margin-bottom: 5px; background: #f8f9fa;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .record-item:hover { background: #e9ecef; border-left-color: #4facfe; }
        .record-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-left-color: #ffd700; border-left-width: 4px;
            color: white;
        }
        .record-item.active .rid  { color: #ffd700; }
        .record-item.active .rname { color: white; font-weight: 700; }
        .record-item.active .rarabic { color: #e0e0ff; }
        .record-item .rid    { color: #4facfe; font-weight: 600; font-size: 11px; }
        .record-item .rname  { color: #333; font-size: 13px; margin-top: 2px; }
        .record-item .rarabic { color: #888; font-size: 11px; margin-top: 1px; direction: rtl; text-align: right; }
        .nav-actions { display: flex; flex-direction: column; gap: 6px; padding-top: 10px; border-top: 1px solid #e9ecef; }

        .main-content {
            background: white; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .form-header {
            padding: 15px 25px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; border-radius: 10px 10px 0 0;
        }
        .form-header h1 { font-size: 20px; margin-bottom: 3px; }
        .form-header p  { font-size: 12px; opacity: 0.9; }
        .toolbar {
            padding: 10px 20px; background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
        }
        .form-content { flex: 1; overflow-y: auto; padding: 20px 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 700px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-weight: 600; margin-bottom: 5px; color: #495057; font-size: 13px; }
        .form-group input, .form-group textarea {
            padding: 8px 10px; border: 1px solid #ced4da; border-radius: 5px;
            font-size: 13px; font-family: inherit; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: #4facfe;
            box-shadow: 0 0 0 2px rgba(79,172,254,0.15);
        }
        .form-group input[readonly] { background: #e9ecef; cursor: not-allowed; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group.arabic textarea { direction: rtl; text-align: right; }
        .checkbox-row {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; background: #f8f9fa; border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .checkbox-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #28a745; }
        .checkbox-row label { margin: 0; cursor: pointer; font-size: 13px; font-weight: 600; }
        .status-bar {
            padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #e9ecef;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-text { color: #666; font-size: 12px; }
        .record-counter { color: #4facfe; font-weight: 600; font-size: 12px; }

        .btn {
            padding: 7px 16px; border: none; border-radius: 5px;
            cursor: pointer; font-weight: 600; font-size: 13px;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #4facfe; color: white; }
        .btn-light   { background: white; color: #495057; border: 1px solid #ced4da; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .badge-active   { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 5px; }
        .badge-disabled { background: #f8d7da; color: #721c24; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 5px; }
    </style>
</head>
<body>
<div class="container">

    <div class="nav-panel">
        <div class="nav-header">
            <h2>📄 Employer Documents</h2>
            <p>MGS - Massroua General Services</p>
        </div>

        <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search documents..." oninput="renderDocumentList()">

        <ul class="record-list" id="recordList"></ul>

        <div class="nav-actions">
            <button class="btn btn-success" onclick="newDocument()">➕ New Document</button>
            <button class="btn btn-light" onclick="loadDocuments()">🔄 Refresh</button>
            <button class="btn btn-light btn-sm" onclick="window.open('Admin_Dashboard.html','_blank');" style="text-align:center;">🏠 Admin Dashboard</button>
        </div>
    </div>

    <div class="main-content">
        <div class="form-header">
            <h1>📋 Document Information</h1>
            <p>Add, Edit — changes save to Firestore automatically</p>
        </div>

        <div class="toolbar">
            <button class="btn btn-success" onclick="saveDocument()">💾 Save</button>
            <button class="btn btn-light" onclick="newDocument()">➕ New</button>
            <span id="statusText" style="font-size:12px;color:#666;margin-left:auto;"></span>
            <span id="recordCounter" style="font-size:12px;color:#4facfe;font-weight:600;"></span>
        </div>

        <div class="form-content">
            <form id="documentForm" onsubmit="return false;">
                <div class="form-grid">

                    <div class="form-group">
                        <label>Document ID</label>
                        <input type="text" id="DocumentID" readonly>
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <div class="checkbox-row">
                            <input type="checkbox" id="DocumentActive" checked>
                            <label for="DocumentActive" style="color:#28a745;">✅ Active</label>
                            <span style="font-size:11px;color:#999;margin-left:4px;">Uncheck to disable</span>
                        </div>
                    </div>

                    <div class="form-group full">
                        <label>Document Name (English) *</label>
                        <textarea id="DocumentNameEN" placeholder="Enter document name in English..." rows="2"></textarea>
                    </div>

                    <div class="form-group full arabic">
                        <label>اسم المستند (عربي) *</label>
                        <textarea id="DocumentNameAR" placeholder="أدخل اسم المستند بالعربية..." rows="2"></textarea>
                    </div>

                </div>
            </form>
        </div>

        <div class="status-bar">
            <span class="status-text" id="statusBar">Ready</span>
            <span class="record-counter" id="counterBar">0 Documents</span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, setDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD6C4CwBUvZCoNn1Y-U_tCiSp44AoD9Ies",
        authDomain: "mgsd2026.firebaseapp.com",
        projectId: "mgsd2026",
        storageBucket: "mgsd2026.firebasestorage.app",
        messagingSenderId: "918582360831",
        appId: "1:918582360831:web:2dfc49252594645cf2aaca"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.CloudDB = {
        ready: true,
        loadSheet: async function(sheetName) {
            try {
                const snap = await getDocs(query(collection(db, sheetName), orderBy("DocumentID")));
                const rows = [];
                snap.forEach(d => rows.push(d.data()));
                return rows;
            } catch(e) { console.error('loadSheet error:', e); return []; }
        },
        saveRow: async function(sheetName, row) {
            try {
                const id = String(row.DocumentID);
                await setDoc(doc(db, sheetName, id), row);
                return { success: true };
            } catch(e) { console.error('saveRow error:', e); return null; }
        }
    };
</script>

<script>
    var documents = [];
    var currentDocument = null;
    var filteredDocuments = [];

    function init() {
        var tryLoad = function() {
            if (window.CloudDB && window.CloudDB.ready) {
                window.CloudDB.loadSheet('employer_documents').then(function(data) {
                    documents = Array.isArray(data) ? data : [];
                    documents.forEach(function(d) { d.DocumentID = parseInt(d.DocumentID) || 0; });
                    loadDocuments();
                });
            } else {
                setTimeout(tryLoad, 100);
            }
        };
        tryLoad();
    }

    function syncDocToCloud(doc) {
        window.CloudDB.saveRow('employer_documents', doc).then(function(r) {
            console.log('☁️ Synced:', doc.DocumentNameEN, r);
        });
    }

    function loadDocuments() {
        renderDocumentList();
        updateCounter();
        if (documents.length > 0 && !currentDocument) {
            selectDocument(documents[0]);
        }
    }

    function renderDocumentList() {
        var searchTerm = (document.getElementById('searchBox').value || '').toLowerCase();
        filteredDocuments = documents.filter(function(d) {
            if (!searchTerm) return true;
            return [d.DocumentID, d.DocumentNameEN, d.DocumentNameAR].join(' ').toLowerCase().includes(searchTerm);
        });
        var list = document.getElementById('recordList');
        list.innerHTML = '';
        filteredDocuments.forEach(function(doc) {
            var isActive = doc.Active !== false && doc.Active !== 'false' && doc.Active !== 'FALSE';
            var item = document.createElement('li');
            item.className = 'record-item';
            if (currentDocument && currentDocument.DocumentID === doc.DocumentID) item.classList.add('active');
            if (!isActive) item.style.opacity = '0.55';
            var badge = isActive
                ? '<span class="badge-active">ACTIVE</span>'
                : '<span class="badge-disabled">OFF</span>';
            item.innerHTML =
                '<div class="rid">#' + doc.DocumentID + badge + '</div>' +
                '<div class="rname">' + (doc.DocumentNameEN || 'Unnamed') + '</div>' +
                '<div class="rarabic">' + (doc.DocumentNameAR || '') + '</div>';
            item.onclick = function() { selectDocument(doc); };
            list.appendChild(item);
        });
        updateCounter();
    }

    function selectDocument(doc) {
        currentDocument = doc;
        document.getElementById('DocumentID').value    = doc.DocumentID || '';
        document.getElementById('DocumentNameEN').value = doc.DocumentNameEN || '';
        document.getElementById('DocumentNameAR').value = doc.DocumentNameAR || '';
        var chk = document.getElementById('DocumentActive');
        if (chk) chk.checked = doc.Active !== false && doc.Active !== 'false' && doc.Active !== 'FALSE';
        renderDocumentList();
        setStatus('Viewing: ' + (doc.DocumentNameEN || doc.DocumentNameAR));
    }

    function newDocument() {
        currentDocument = null;
        var maxId = 0;
        documents.forEach(function(d) { var id = parseInt(d.DocumentID); if (id > maxId) maxId = id; });
        document.getElementById('DocumentID').value     = maxId + 1;
        document.getElementById('DocumentNameEN').value = '';
        document.getElementById('DocumentNameAR').value = '';
        document.getElementById('DocumentActive').checked = true;
        setStatus('Creating new document...');
        document.getElementById('DocumentNameEN').focus();
        renderDocumentList();
    }

    function saveDocument() {
        var docId  = parseInt(document.getElementById('DocumentID').value);
        var nameEN = document.getElementById('DocumentNameEN').value.trim();
        var nameAR = document.getElementById('DocumentNameAR').value.trim();

        if (!docId || isNaN(docId) || docId <= 0) {
            var maxId = 0;
            documents.forEach(function(d) { var id = parseInt(d.DocumentID); if (!isNaN(id) && id > maxId) maxId = id; });
            docId = maxId + 1;
            document.getElementById('DocumentID').value = docId;
        }
        if (!nameEN) { alert('⚠️ Document Name (English) is required!'); document.getElementById('DocumentNameEN').focus(); return; }
        if (!nameAR) { alert('⚠️ Document Name (Arabic) is required!'); document.getElementById('DocumentNameAR').focus(); return; }

        var documentData = {
            DocumentID:     docId,
            DocumentNameEN: nameEN,
            DocumentNameAR: nameAR,
            Active:         document.getElementById('DocumentActive').checked
        };

        var existingIndex = documents.findIndex(function(d) { return parseInt(d.DocumentID) === docId; });
        if (existingIndex >= 0) { documents[existingIndex] = documentData; }
        else { documents.push(documentData); }

        syncDocToCloud(documentData);
        currentDocument = documentData;
        renderDocumentList();
        setStatus('✅ Saved: ' + documentData.DocumentNameEN);
        setTimeout(function() { setStatus('Viewing: ' + documentData.DocumentNameEN); }, 2000);
    }

    function setStatus(msg) {
        document.getElementById('statusText').textContent = msg;
        document.getElementById('statusBar').textContent  = msg;
    }

    function updateCounter() {
        var active = filteredDocuments.filter(function(d) { return d.Active !== false && d.Active !== 'false' && d.Active !== 'FALSE'; }).length;
        var text = active + ' active / ' + filteredDocuments.length + ' total';
        document.getElementById('recordCounter').textContent = text;
        document.getElementById('counterBar').textContent    = text;
    }

    window.newDocument = newDocument;
    window.saveDocument = saveDocument;
    window.loadDocuments = loadDocuments;
    window.renderDocumentList = renderDocumentList;

    init();
</script>
</body>
</html>
