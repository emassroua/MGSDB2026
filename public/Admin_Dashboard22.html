<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { height: 100vh; background: #343a40; color: white; }
    .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px; }
    .sidebar a:hover { background: #495057; color: white; }
    .card { margin-bottom: 20px; }
    .status-arrived { color: green; }
    .status-pending { color: orange; }
    .status-cancelled { color: red; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 sidebar p-3">
      <h4>Dashboard</h4>
      <a href="#">Workers</a>
      <a href="#">Suppliers</a>
      <a href="#">Documents</a>
      <a href="#">Events</a>
      <a href="#">Reports</a>
      <a href="#">Settings</a>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 p-4">
      <!-- Top Row: Overview Cards -->
      <div class="row">
        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h5 class="card-title">Workers</h5>
              <p class="card-text">Total: 120<br><span class="status-arrived">Arrived: 80</span></p>
              <button class="btn btn-primary btn-sm">Add Worker</button>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h5 class="card-title">Suppliers</h5>
              <p class="card-text">Active: 15<br>Inactive: 3</p>
              <button class="btn btn-primary btn-sm">Add Supplier</button>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h5 class="card-title">Documents</h5>
              <p class="card-text">Pending: 25<br>Expiring Soon: 10</p>
              <button class="btn btn-primary btn-sm">Upload Document</button>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h5 class="card-title">Events</h5>
              <p class="card-text">Upcoming: 12</p>
              <button class="btn btn-primary btn-sm">Schedule Event</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts Placeholder -->
      <div class="row">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Worker Status Distribution</h5>
              <canvas id="workerChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Supplier Performance</h5>
              <canvas id="supplierChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="mt-4 text-muted">
        Last Backup: Never | System Health: <span class="status-arrived">Good</span>
      </footer>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Example charts
  new Chart(document.getElementById('workerChart'), {
    type: 'pie',
    data: {
      labels: ['Arrived', 'Selected', 'Cancelled', 'Local'],
      datasets: [{ data: [80, 20, 10, 10], backgroundColor: ['green','blue','red','orange'] }]
    }
  });

  new Chart(document.getElementById('supplierChart'), {
    type: 'bar',
    data: {
      labels: ['Supplier A','Supplier B','Supplier C'],
      datasets: [{ label: 'Workers', data: [30, 50, 40], backgroundColor: 'steelblue' }]
    }
  });
</script>
</body>
</html>
