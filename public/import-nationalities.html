const log = document.getElementById('log');
function addLog(msg, cls) {
  log.innerHTML += `<div class="${cls||''}">${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

window.runImport = async function() {
  document.getElementById('btn').disabled = true;
  addLog('🚀 Starting import with PascalCase fields and numeric IDs...');
  let added = 0, errors = 0;

  for (let i = 0; i < NATIONALITIES.length; i++) {
    const [Country, Nationality, CountryAr, NationalityAr, Active] = NATIONALITIES[i];
    const id = i + 1;
    try {
      await setDoc(doc(db, "nationalities", String(id)), {
        NationalityID: id,
        Country, Nationality, CountryAr, NationalityAr,
        Active: !!Active
      });
      added++;
      if (i % 10 === 0) addLog(`✅ ${id}/${NATIONALITIES.length}: ${Country}`, 'ok');
    } catch(e) {
      errors++;
      addLog(`❌ ERROR on ${Country}: ${e.message}`, 'err');
    }
  }

  addLog('──────────────────────', '');
  addLog(`🎉 DONE! Added: ${added}, Errors: ${errors}`, 'ok');
  document.getElementById('btn').textContent = '✅ Finished';
};
