<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents Manager - MGSDB2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .badge {
            display: inline-block;
            background: #ff9800;
            color: white;
            padding: 8px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0;
            letter-spacing: 1px;
        }
        p { color: #888; font-size: 15px; margin-bottom: 30px; }
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .back-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128203;</div>
        <h1>Documents Manager</h1>
        <div class="badge">UNDER CONSTRUCTION</div>
        <p>This module is currently being developed. Please check back soon.</p>
        <a class="back-btn" href="https://script.google.com/macros/s/AKfycbwYCnfqcqPkVax5E2nd9-CCiKb9gNRrgWIMMrPZ-lSpMuEpRTSiHKg9rZxcfeP8fjCM/exec?page=Dashboard">&#8592; Back to Dashboard</a>
    </div>
</body>
</html>
